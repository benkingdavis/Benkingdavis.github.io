<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Opening Messages...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f7;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 48px 40px;
      text-align: center;
      max-width: 360px;
      width: 90%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    .icon {
      font-size: 56px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      color: #1d1d1f;
      margin-bottom: 10px;
    }

    p {
      font-size: 15px;
      color: #6e6e73;
      line-height: 1.5;
      margin-bottom: 28px;
    }

    .btn {
      display: inline-block;
      background: #007AFF;
      color: white;
      text-decoration: none;
      padding: 14px 32px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 500;
      transition: background 0.2s;
    }

    .btn:hover {
      background: #0062cc;
    }

    .fallback {
      margin-top: 20px;
      font-size: 13px;
      color: #aaa;
    }

    .fallback a {
      color: #007AFF;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">💬</div>
    <h1>Opening Messages...</h1>
    <p>You'll be redirected to your Messages app to start a conversation.</p>
    <a class="btn" id="smsLink" href="#">Open Messages</a>
    <p class="fallback">Not working? Open your Messages app manually.</p>
  </div>

  <script>
    // --- CONFIGURATION ---
    const PHONE_NUMBER = "";
    const PREFILL_MESSAGE = "Hey! I wanted to refer you to Ben Davis State Farm. They have been great for me and I think they can help you too. Give them a call or text at 303-759-5165.";
    // ---------------------

    function getSmsLink(phone, message) {
      const encoded = encodeURIComponent(message);
      const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
      if (phone) {
        return isIOS
          ? `sms:${phone}&body=${encoded}`
          : `sms:${phone}?body=${encoded}`;
      } else {
        return isIOS
          ? `sms:&body=${encoded}`
          : `sms:?body=${encoded}`;
      }
    }

    const link = getSmsLink(PHONE_NUMBER, PREFILL_MESSAGE);
    document.getElementById("smsLink").href = link;

    // Auto-redirect after short delay
    setTimeout(() => {
      window.location.href = link;
    }, 800);
  </script>
</body>
</html>
